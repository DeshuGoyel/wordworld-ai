name: learn_app
description: LearnVerse - AI-First Learning App for Kids 2-7
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  go_router: ^13.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_tts: ^4.0.2
  google_fonts: ^6.1.0
  audioplayers: ^6.0.0
  fl_chart: ^0.66.0
  uuid: ^4.2.1
  intl: ^0.19.0
  path_provider: ^2.1.1
  share_plus: ^7.2.1
  permission_handler: ^11.1.0
  record: ^5.0.4
  confetti: ^0.7.0
  http: ^1.2.0
  image_picker: ^1.0.0
  video_player: ^2.8.0
  connectivity_plus: ^6.0.0
  flutter_animate: ^4.5.0
  shared_preferences: ^2.5.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.7

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/audio/
    - assets/data/
  fonts:
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito-Regular.ttf
        - asset: assets/fonts/Nunito-Bold.ttf
          weight: 700
        - asset: assets/fonts/Nunito-ExtraBold.ttf
          weight: 800
